name: evaluation-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python scripts/build_dataset.py --train-size 30 --validation-size 10 --test-size 10
      - run: python scripts/run_baseline.py --dataset data/test.jsonl --output reports/baseline_results.json
      - run: python scripts/run_error_analysis.py --evaluation reports/baseline_results.json --output reports/error_analysis.json
      - run: python scripts/generate_report.py --evaluation reports/baseline_results.json --errors reports/error_analysis.json --output reports/baseline_report.md
