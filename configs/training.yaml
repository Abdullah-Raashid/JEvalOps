seed: 42
base_model: rinna/japanese-gpt2-small
dataset:
  train_path: data/processed/sft_train.jsonl
  validation_path: data/validation.jsonl
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - c_attn
    - c_proj
    - c_fc
training:
  learning_rate: 0.001
  max_steps: 200
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  eval_steps: 50
  save_steps: 100
  mixed_precision: "no"
  early_stopping_patience: 3
